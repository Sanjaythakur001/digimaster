<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Annotated Google search results page showing two sponsored ad positions above the organic results">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="annoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- ===== Browser window (the "screenshot") ===== -->
  <g filter="url(#shadow)">
    <rect x="20" y="20" width="560" height="580" rx="14" fill="#ffffff"/>
    <!-- chrome bar -->
    <rect x="20" y="20" width="560" height="38" rx="14" fill="#f1f3f4"/>
    <rect x="20" y="44" width="560" height="14" fill="#f1f3f4"/>
    <circle cx="44" cy="39" r="5" fill="#ef4444"/>
    <circle cx="62" cy="39" r="5" fill="#f59e0b"/>
    <circle cx="80" cy="39" r="5" fill="#22c55e"/>
    <rect x="110" y="29" width="360" height="20" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="124" y="43" font-size="11" fill="#9aa0a6">www.google.com/search?q=running+shoes+online</text>
  </g>

  <!-- search box -->
  <rect x="44" y="76" width="430" height="40" rx="20" fill="#fff" stroke="#dfe1e5"/>
  <circle cx="70" cy="96" r="7" fill="none" stroke="#9aa0a6" stroke-width="2"/>
  <line x1="75" y1="101" x2="82" y2="108" stroke="#9aa0a6" stroke-width="2"/>
  <text x="96" y="101" font-size="14" fill="#202124">running shoes online</text>
  <text x="44" y="138" font-size="11" fill="#70757a">About 49,40,00,000 results (0.46 sec)</text>

  <!-- ===== Sponsored / Ads block ===== -->
  <g>
    <text x="44" y="166" font-size="12" font-weight="700" fill="#202124">Sponsored</text>

    <!-- Ad 1 -->
    <text x="44" y="190" font-size="11" font-weight="700" fill="#202124">Ad</text>
    <text x="64" y="190" font-size="11" fill="#3c4043">·  runfast.in/shoes</text>
    <text x="44" y="210" font-size="15" font-weight="600" fill="#1a0dab">RunFast Running Shoes — Flat 40% Off, Free Delivery</text>
    <text x="44" y="228" font-size="11.5" fill="#4d5156">Engineered for marathon runners. Free returns in 30 days.</text>
    <text x="44" y="243" font-size="11.5" fill="#4d5156">Shop men's &amp; women's. Buy 2 get extra 10% off today.</text>

    <!-- Ad 2 -->
    <text x="44" y="276" font-size="11" font-weight="700" fill="#202124">Ad</text>
    <text x="64" y="276" font-size="11" fill="#3c4043">·  megashoes.com</text>
    <text x="44" y="296" font-size="15" font-weight="600" fill="#1a0dab">MegaShoes — India's Largest Footwear Store</text>
    <text x="44" y="314" font-size="11.5" fill="#4d5156">5000+ styles. Cash on delivery available across India.</text>
  </g>

  <!-- divider -->
  <line x1="44" y1="338" x2="556" y2="338" stroke="#ebebeb"/>

  <!-- ===== Organic results ===== -->
  <g>
    <text x="44" y="362" font-size="11.5" fill="#202124">decathlon.in › running › shoes</text>
    <text x="44" y="382" font-size="15" font-weight="600" fill="#1a0dab">Running Shoes — Buy Online | Decathlon</text>
    <text x="44" y="400" font-size="11.5" fill="#4d5156">Wide range of running shoes for every terrain and budget.</text>

    <text x="44" y="432" font-size="11.5" fill="#202124">nike.com › in › running</text>
    <text x="44" y="452" font-size="15" font-weight="600" fill="#1a0dab">Nike Running Shoes. Nike IN</text>
    <text x="44" y="470" font-size="11.5" fill="#4d5156">Find the perfect running shoe with Nike React &amp; ZoomX.</text>

    <rect x="44" y="492" width="120" height="76" rx="8" fill="#f8f9fa" stroke="#ebebeb"/>
    <rect x="172" y="492" width="120" height="76" rx="8" fill="#f8f9fa" stroke="#ebebeb"/>
    <text x="44" y="586" font-size="10.5" fill="#70757a">People also ask · Images · Shopping</text>
  </g>

  <!-- ===== Annotation callouts (right rail) ===== -->
  <g font-family="Inter, system-ui, sans-serif">
    <!-- to Ad 1 -->
    <path d="M474 200 H612" stroke="url(#annoGrad)" stroke-width="2" fill="none"/>
    <circle cx="474" cy="200" r="3.5" fill="#3b82f6"/>
    <rect x="612" y="176" width="228" height="52" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="624" y="196" font-size="12" font-weight="700" fill="#4338ca">Position 1 · highest Ad Rank</text>
    <text x="624" y="214" font-size="10.5" fill="#4f46e5">Won on Bid × Quality Score —</text>
    <text x="624" y="226" font-size="10.5" fill="#4f46e5">not necessarily the highest bid.</text>

    <!-- to Ad 2 -->
    <path d="M390 286 H612" stroke="url(#annoGrad)" stroke-width="2" fill="none"/>
    <circle cx="390" cy="286" r="3.5" fill="#a855f7"/>
    <rect x="612" y="262" width="228" height="52" rx="10" fill="#faf5ff" stroke="#e9d5ff"/>
    <text x="624" y="282" font-size="12" font-weight="700" fill="#7e22ce">Position 2 · paid placement</text>
    <text x="624" y="300" font-size="10.5" fill="#9333ea">Pays just enough to beat the</text>
    <text x="624" y="312" font-size="10.5" fill="#9333ea">Ad Rank of the result below it.</text>

    <!-- to organic -->
    <path d="M300 382 H612" stroke="#22c55e" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
    <circle cx="300" cy="382" r="3.5" fill="#22c55e"/>
    <rect x="612" y="358" width="228" height="52" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="624" y="378" font-size="12" font-weight="700" fill="#15803d">Organic results · ₹0 per click</text>
    <text x="624" y="396" font-size="10.5" fill="#16a34a">Earned via SEO. Ads sit above</text>
    <text x="624" y="408" font-size="10.5" fill="#16a34a">them — that's what you pay for.</text>

    <!-- legend / key takeaway -->
    <rect x="612" y="470" width="228" height="98" rx="10" fill="#0f172a"/>
    <text x="626" y="494" font-size="12" font-weight="700" fill="#ffffff">The anatomy that matters</text>
    <text x="626" y="514" font-size="10.5" fill="#cbd5e1">• Top ~4 slots are auctioned.</text>
    <text x="626" y="530" font-size="10.5" fill="#cbd5e1">• Order = Ad Rank, refreshed</text>
    <text x="640" y="544" font-size="10.5" fill="#cbd5e1">on every single search.</text>
    <text x="626" y="560" font-size="10.5" fill="#cbd5e1">• You pay per click (CPC), not</text>
    <text x="640" y="574" font-size="10.5" fill="#cbd5e1">to appear.</text>
  </g>
</svg>
